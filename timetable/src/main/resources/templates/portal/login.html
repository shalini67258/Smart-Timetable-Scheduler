<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #f4f7fa;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Dynamic badge based on URL parsing */
        .role-badge {
            display: inline-block;
            padding: 6px 14px;
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #4a5568;
            margin-bottom: 16px;
        }

        .login-header h2 {
            font-size: 1.8rem;
            color: #1a202c;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e0;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #2d3748;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #1a202c;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2d3748;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #718096;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #1a202c;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="role-badge" th:text="${role + ' Portal'}">Profile Dashboard</div>
            <h2>Secure Sign In</h2>
        </div>

       <form th:action="@{/login/process}" method="POST">
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="name@drk.in" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-submit">Sign In</button>
</form>

        <a href="/" class="back-link">&larr; Return to main hub</a>
    </div>

</body>
</html>
