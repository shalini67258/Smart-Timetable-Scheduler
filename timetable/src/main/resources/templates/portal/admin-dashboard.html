<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome, Admin - Timetable Engine Hub</title>
    <style>
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1b264f 0%, #090d22 100%); color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-top: 40px; margin-bottom: 10px; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 6px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; justify-content: center; margin-top: 30px; max-width: 1000px; padding: 0 20px; }
        .grid-card { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; transition: 0.3s; text-align: center; padding: 10px; }
        .grid-card:hover { background: linear-gradient(135deg, #3498db 0%, #9b59b6 100%); transform: translateY(-5px); }
        .workspace-section { width: 90%; max-width: 940px; background: #ffffff; color: #2c3e50; border-radius: 16px; padding: 30px; margin: 40px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background: #2c3e50; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-submit:hover { background: #1a252f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f8fafc; }
        .delete-link { color: #e74c3c; font-weight: bold; text-decoration: none; }
        .alert-banner { color: #155724; background: #d4edda; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #c3e6cb; }
    </style>
    <script>
        function showPanel(panelId) {
            document.querySelectorAll('.panel-content').forEach(p => p.style.display = 'none');
            const target = document.getElementById(panelId);
            if(target) { target.style.display = 'block'; localStorage.setItem("activeTimetablePanel", panelId); }
        }
        window.onload = () => {
            const savedPanel = localStorage.getItem("activeTimetablePanel") || 'faculty-panel';
            showPanel(savedPanel);
        }
    </script>
</head>
<body>

    <div class="header">
        <h1 th:text="'Welcome, ' + (${user != null} ? ${user.fullName} : 'Admin')">Welcome</h1>
        <a href="/" class="logout-btn">Logout</a>
    </div>

    <div class="grid-container">
        <div class="grid-card" onclick="showPanel('faculty-panel')">Manage Faculty</div>
        <div class="grid-card" onclick="showPanel('subjects-panel')">Manage Subjects</div>
        <div class="grid-card" onclick="showPanel('manual-panel')">Manual Entry</div>
        <div class="grid-card" onclick="showPanel('view-panel')">View Timetable</div>
        <div class="grid-card" onclick="showPanel('classroom-panel')">Add Classrooms</div>
        <div class="grid-card" onclick="showPanel('settings-panel')">Settings & Mapping</div>
        <div class="grid-card" onclick="showPanel('generate-panel')">Generate Timetable</div>
    </div>

    <div id="workspace" class="workspace-section">
        <div class="alert-banner" th:if="${statusMsg != null}" th:text="${statusMsg}"></div>

        <div id="faculty-panel" class="panel-content">
            <h2>Faculty Registry</h2>
            <form action="/admin/add-teacher" method="POST">
                <input type="hidden" name="adminEmail" th:value="${user?.email ?: 'admin@drk.in'}">
                <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                <button type="submit" class="btn-submit">Add Member</button>
            </form>
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="t : ${teachers}">
                        <td th:text="${t.name}"></td><td th:text="${t.email}"></td>
                        <td><a class="delete-link" th:href="@{/admin/delete-teacher/{id}(id=${t.id}, adminEmail=${user?.email ?: 'admin@drk.in'})}">Delete</a></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="subjects-panel" class="panel-content" style="display:none;">
    <h2>Manage Subjects</h2>
    <form th:action="@{/admin/add-subject}" method="POST">
        <input type="hidden" name="adminEmail" th:value="${user?.email ?: 'admin@drk.in'}" />
        <div class="form-group"><label>Code</label><input type="text" name="subjectCode" required></div>
        <div class="form-group"><label>Name</label><input type="text" name="subjectName" required></div>
        <div class="form-group"><label>Branch</label>
            <select name="branch" required>
                <option th:each="c : ${courses}" th:value="${c.courseName}" th:text="${c.courseName}"></option>
            </select>
        </div>
        <div class="form-group"><label>Academic Year</label>
            <select name="academicYear" required>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select>
        </div>
        <div class="form-group"><label>Faculty</label>
            <select name="assignedTeacher" required>
                <option th:each="t : ${teachers}" th:value="${t.name}" th:text="${t.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Save Subject</button>
    </form>
</div>
        <div id="settings-panel" class="panel-content" style="display:none;">
            <h2>System Settings</h2>
            <form th:action="@{/admin/save-settings}" method="POST">
                <input type="hidden" name="adminEmail" th:value="${user?.email ?: 'admin@drk.in'}" />
                <div class="form-group"><label>Sections (comma separated):</label>
                    <textarea name="sections" th:text="${#strings.listJoin(sections, ',')}" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Update System</button>
            </form>

            <hr>

            <h3>Map Subject to Academic Year</h3>
            <form th:action="@{/admin/map-year-subject}" method="POST">
                <input type="hidden" name="adminEmail" th:value="${user?.email ?: 'admin@drk.in'}" />
                <select name="academicYear" required>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                </select>
                <select name="subjectId" required>
                    <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.subjectName}"></option>
                </select>
                <button type="submit" class="btn-submit">Assign Mapping</button>
            </form>
        </div>

        <div id="generate-panel" class="panel-content" style="display:none; text-align:center;">
            <h2>Generate Timetable</h2>
            <form action="/admin/run-compiler" method="POST">
                <input type="hidden" name="adminEmail" th:value="${user?.email ?: 'admin@drk.in'}">
                <button type="submit" class="btn-submit" style="background: #10b981; font-size: 18px;">Execute Engine</button>
            </form>
        </div>
    </div>
</body>
</html>
